<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
</head>
<body class="apps-page">

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="websites.html">Websites</a>
            <a href="apps.html">Apps & Mobile</a>
        </div>
        <div class="nav-icon">
            <a href="https://github.com/Bianca-26" class="GitHub-box">
                <img src="GitHub.svg" alt="GitHub">
            </a>
        </div>
    </nav>

    <section class="hero">

         <div class="Waves">
            <img src="Warn.svg" alt="warn" class="warn-svg">
        </div>

        <div class="content-2">
            <h1>Apps & Mobile</h1>
            <div id="lottie-animation"></div>
        </div>


        <div class="content">
        </div>
    </section>

    <div id="proiecte-container" class="projects-grid">
    </div>

    <script>
    var animation = lottie.loadAnimation({
        container: document.getElementById('lottie-animation'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: 'white arrow motion.json' 
    });
</script>

<div id="proiecte-apps" class="projects-grid"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    
    const firebaseConfig = {
        apiKey: "AIzaSyAR1Z2STUpIXcQRFmvXRmb9Oz4Vf326Clc",
        authDomain: "portofolio-7beef.firebaseapp.com",
        projectId: "portofolio-7beef",
        storageBucket: "portofolio-7beef.firebasestorage.app",
        messagingSenderId: "554922753203",
        appId: "1:554922753203:web:e3fc0cc56216e7495984c6",
        measurementId: "G-7QJ1MVVDN7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function afiseazaProiecte() {
        const container = document.getElementById('proiecte-apps');

        // Citim tot, fără filtre (până vedem că apare ceva)
        db.collection("proiecte").where("categorie", "==", "apps").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
            container.innerHTML = ""; 

            if (querySnapshot.empty) {
                container.innerHTML = "<p>Baza de date pare goală...</p>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const date = doc.data();
                let figmaEmbed = "";
            if (date.figmaLink.includes("embed.figma.com")) {
        // Dacă link-ul este deja de tip EMBED (cum e cel de Webpage), îl lăsăm așa
        figmaEmbed = date.figmaLink;
    } else if (date.figmaLink.includes("proto")) {
        // Dacă este PROTOTIP, adăugăm parametrii de scalare
        figmaEmbed = `${date.figmaLink}&hide-ui=1&scaling=scale-down-width&embed_host=share`;
    } else {
        // Dacă este un link de DESIGN normal (figma.com/file/...), îl transformăm în embed
        figmaEmbed = `https://www.figma.com/embed?embed_host=share&url=${date.figmaLink}`;
    }
                
                container.innerHTML += `
    <div class="project-card" style="padding: 0; overflow: hidden; background: #170030; border-radius: 20px; margin-bottom: 50px; display: flex; flex-direction: column;">
        
        <div class="project-info" style="padding: 40px; width: 100%; box-sizing: border-box;">
            <h3 style="margin: 0 0 30px 0; font-weight: 900; font-size: 2.5rem; text-align: left;">
                ${date.titlu}
            </h3>
            <p style="margin: 0 0 40px 0; opacity: 0.8; font-size: 1.1rem; line-height: 1.6; text-align: left; max-width: 100%;">
                ${date.descriere}
            </p>
            
            <a href="${date.figmaLink}" target="_blank" class="view-full-btn" style="
                display: inline-block;
                padding: 15px 30px;
                background-color: #E086FF;
                color: #170030;
                text-decoration: none;
                border-radius: 12px;
                font-weight: 900;
                transition: 0.3s;
            ">View Full Project ↗</a>
        </div>

        <div class="figma-preview-container" style="width: 100%; height: 600px; background: #000; border-top: 1px solid rgba(255,255,255,0.1);">
            <iframe 
                src="${figmaEmbed}" 
                width="100%" 
                height="100%" 
                style="border: none; display: block;" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
`;
            });
        }, (error) => {
            console.log("Eroare Firebase:", error);
        });
    }

    afiseazaProiecte();
</script>

</body>
</html>
