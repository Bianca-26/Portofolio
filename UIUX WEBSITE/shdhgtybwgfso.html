            <div class="admin-card">

if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // Funcția ta
    async function trimiteDate() {

        try {
            const titluIntrodus = document.getElementById('web-title').value;
            const descriereIntrodusa = document.getElementById('web-desc').value;
            const linkIntrodus = document.getElementById('web-link').value;

            console.log("Date colectate:", titluIntrodus, descriereIntrodusa, linkIntrodus);

            await db.collection("proiecte").add({
                titlu: titluIntrodus,
                descriere: descriereIntrodusa,
                figmaLink: linkIntrodus,
                categorie: "websites",
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // Metodă mai sigură pentru timp
            });

            alert("Proiect adăugat în baza de date!");
        } catch (error) {
            console.error("Eroare la trimitere:", error);
            alert("Eroare: " + error.message);
        }
    }

    async function trimiteDateApps() {

        try {
            const titluIntrodus = document.getElementById('app-title').value;
            const descriereIntrodusa = document.getElementById('app-desc').value;
            const linkIntrodus = document.getElementById('app-link').value;

            console.log("Date colectate:", titluIntrodus, descriereIntrodusa, linkIntrodus);

            await db.collection("proiecte").add({
                titlu: titluIntrodus,
                descriere: descriereIntrodusa,
                figmaLink: linkIntrodus,
                categorie: "apps",
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // Metodă mai sigură pentru timp
            });

            alert("Proiect adăugat în baza de date!");
        } catch (error) {
            console.error("Eroare la trimitere:", error);
            alert("Eroare: " + error.message);
        }
    }
